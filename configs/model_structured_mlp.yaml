data:
  train_csv: data/processed/fair_fusion_train.csv
  val_csv: data/processed/fair_fusion_val.csv
  test_csv: data/processed/fair_fusion_test.csv
  labels: [NORM, MI, STTC, CD, HYP]
model:
  name: structured_mlp
  modality: structured
  hidden_dims: [512, 256]
  dropout: 0.3
  num_classes: 5
training:
  epochs: 100
  batch_size: 128
  learning_rate: 0.001
  weight_decay: 0.0001
  patience: 10
  min_delta: 0.0005
  seed: 2026
  device: auto
output:
  val_predictions_csv: results/internal/ablation_structured/structured_mlp_val_predictions.csv
  test_predictions_csv: results/internal/ablation_structured/structured_mlp_test_predictions.csv
  history_csv: results/internal/ablation_structured/structured_mlp_training_history.csv
  metrics_val_csv: results/internal/ablation_structured/structured_mlp_metrics_val.csv
  metrics_test_csv: results/internal/ablation_structured/structured_mlp_metrics_test.csv
  thresholds_json: results/internal/ablation_structured/structured_mlp_thresholds.json
  run_summary_json: results/internal/ablation_structured/structured_mlp_run_summary.json
  checkpoint_path: results/internal/ablation_structured/structured_mlp_best.pt
  table_csv: tables/table_structured_mlp_results.csv
  threshold_comparison_csv: tables/table_structured_mlp_threshold_comparison.csv
